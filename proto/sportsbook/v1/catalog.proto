syntax = "proto3";

package sportsbook.v1;

option go_package = "github.com/sportsbook/sb/gen/sportsbook/v1;sbv1";

import "google/protobuf/timestamp.proto";

// CatalogService provides read access to the Market Catalog.
// Bet Acceptance calls GetMarket to verify market status during bet validation.
service CatalogService {
  rpc GetMarket(GetMarketRequest)         returns (GetMarketResponse);
  rpc GetSelection(GetSelectionRequest)   returns (GetSelectionResponse);
  rpc ListMarkets(ListMarketsRequest)     returns (ListMarketsResponse);
}

message GetMarketRequest {
  string market_id = 1;
}

message GetMarketResponse {
  Market market = 1;
}

message GetSelectionRequest {
  string selection_id = 1;
}

message GetSelectionResponse {
  Selection selection = 1;
}

message ListMarketsRequest {
  string event_id  = 1;
  int32  page_size = 2;
  string page_token = 3;
}

message ListMarketsResponse {
  repeated Market markets        = 1;
  string          next_page_token = 2;
}

// ── Domain types ──────────────────────────────────────────────────────────────

message Market {
  string       market_id   = 1;
  string       event_id    = 2;
  string       name        = 3;
  MarketStatus status      = 4;
  google.protobuf.Timestamp opens_at  = 5;
  google.protobuf.Timestamp closes_at = 6;
}

message Selection {
  string market_id    = 1;
  string selection_id = 2;
  string name         = 3;
  bool   active       = 4;
}

enum MarketStatus {
  MARKET_STATUS_UNSPECIFIED = 0;
  MARKET_STATUS_OPEN        = 1;
  MARKET_STATUS_SUSPENDED   = 2;
  MARKET_STATUS_CLOSED      = 3;
  MARKET_STATUS_SETTLED     = 4;
}
