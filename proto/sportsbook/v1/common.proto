syntax = "proto3";

package sportsbook.v1;

option go_package = "github.com/sportsbook/sb/gen/sportsbook/v1;sbv1";

// Money represents a decimal amount with explicit currency.
message Money {
  // Amount in minor units (e.g. cents). Divide by 100 for display.
  int64  amount_minor = 1;
  string currency     = 2; // ISO 4217, e.g. "GBP"
}

// Odds in American and Decimal formats.
// Decimal is the canonical computational form (e.g. 2.50 = total return per unit staked).
// American is the display form (e.g. +150 underdog, -200 favourite).
message Odds {
  double decimal  = 1; // e.g. 2.50
  int32  american = 2; // e.g. +150 or -200
}

// KYCStatus mirrors the Identity service enum so callers don't need to
// import the identity proto.
enum KYCStatus {
  KYC_STATUS_UNSPECIFIED = 0;
  KYC_STATUS_PENDING     = 1;
  KYC_STATUS_VERIFIED    = 2;
  KYC_STATUS_REJECTED    = 3;
}
